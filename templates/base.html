<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Chat{% endblock %}</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* 主色调 — 靛蓝系 */
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --primary-light: rgba(79, 70, 229, 0.08);
            --primary-lighter: rgba(79, 70, 229, 0.04);

            /* 背景 */
            --bg: #FFFFFF;
            --bg-secondary: #F8F9FB;
            --bg-tertiary: #F1F3F5;

            /* 文字 */
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-muted: #9CA3AF;
            --text-inverse: #FFFFFF;

            /* 边框 */
            --border: #E5E7EB;
            --border-light: #F3F4F6;

            /* 聊天气泡 */
            --bubble-own: #4F46E5;
            --bubble-own-text: #FFFFFF;
            --bubble-other: #F3F4F6;

            /* 功能色 */
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --info: #3B82F6;

            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.05);

            /* 圆角 */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;

            /* 过渡 */
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0 1.25rem;
            height: 56px;
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 100;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary) !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.02em;
        }

        .navbar-brand i {
            font-size: 1.2rem;
        }

        .nav-link {
            color: var(--text-secondary) !important;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 0.75rem !important;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--primary) !important;
            background: var(--primary-light);
        }

        .nav-user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .nav-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8rem;
        }

        /* ===== 通用组件 ===== */
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-outline-secondary {
            border-radius: var(--radius-sm);
            font-weight: 500;
            transition: var(--transition);
        }

        .form-control {
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.625rem 0.875rem;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.375rem;
        }

        /* ===== 模态框 ===== */
        .modal-content {
            border: none;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-light);
            padding: 1.25rem 1.5rem;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            border-top: 1px solid var(--border-light);
            padding: 1rem 1.5rem;
        }

        .modal-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        /* ===== 卡片 ===== */
        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        /* ===== 徽标 ===== */
        .badge {
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.02em;
        }

        /* ===== 分隔线 ===== */
        hr {
            border-color: var(--border-light);
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

        /* ===== 动画 ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    {% if user %}
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid" style="max-width: 100%;">
            <a class="navbar-brand" href="{{ url_for('chat') }}">
                <i class="fas fa-comments"></i> Team Chat
            </a>
            <div class="d-flex align-items-center gap-1">
                <div class="nav-user-info me-2">
                    <div class="nav-avatar">{{ user.nickname[0] }}</div>
                    <span>{{ user.nickname }}</span>
                </div>
                {% if user.is_admin %}
                <a class="nav-link" href="{{ url_for('admin') }}">
                    <i class="fas fa-shield-halved"></i> 管理
                </a>
                {% endif %}
                <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#profileModal">
                    <i class="fas fa-gear"></i>
                </a>
                <a class="nav-link text-danger" href="{{ url_for('logout') }}">
                    <i class="fas fa-right-from-bracket"></i>
                </a>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="container-fluid p-0">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/socket.io.min.js"></script>

    {% if user is defined %}
    <!-- 个人设置 -->
    <div class="modal fade" id="profileModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-gear me-2"></i>个人设置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" value="{{ user.username }}" disabled style="opacity: 0.7;">
                        <div class="form-text">用户名不可修改</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">昵称</label>
                        <input type="text" class="form-control" id="profile-nickname" value="{{ user.nickname }}">
                    </div>
                    <div class="border-top pt-3">
                        <h6 class="mb-3" style="font-size: 0.9rem; color: var(--text-secondary);"><i class="fas fa-lock me-1"></i>修改密码</h6>
                        <div class="mb-3">
                            <label class="form-label">当前密码</label>
                            <input type="password" class="form-control" id="current-password" placeholder="不修改请留空">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-control" id="new-password" minlength="6" placeholder="至少 6 个字符">
                        </div>
                        <div class="mb-0">
                            <label class="form-label">确认新密码</label>
                            <input type="password" class="form-control" id="confirm-password" minlength="6">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="updateProfile()">
                        <i class="fas fa-check me-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateProfile() {
            const nickname = document.getElementById('profile-nickname').value.trim();
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!nickname) { alert('昵称不能为空'); return; }

            if (currentPassword || newPassword || confirmPassword) {
                if (!currentPassword) { alert('请输入当前密码'); return; }
                if (!newPassword) { alert('请输入新密码'); return; }
                if (newPassword.length < 6) { alert('密码至少 6 个字符'); return; }
                if (newPassword !== confirmPassword) { alert('两次输入的密码不一致'); return; }
            }

            try {
                const response = await fetch('/api/update_profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nickname,
                        current_password: currentPassword || null,
                        new_password: newPassword || null
                    })
                });
                const result = await response.json();
                if (result.success) {
                    if (result.nickname) { location.reload(); }
                    else {
                        bootstrap.Modal.getInstance(document.getElementById('profileModal')).hide();
                        document.getElementById('current-password').value = '';
                        document.getElementById('new-password').value = '';
                        document.getElementById('confirm-password').value = '';
                    }
                } else {
                    alert(result.error);
                }
            } catch (error) {
                alert('保存失败');
            }
        }
    </script>
    {% endif %}

    {% block extra_js %}{% endblock %}
</body>
</html>
