{% extends "base.html" %}

{% block title %}登录 - Team Chat{% endblock %}

{% block extra_css %}
<style>
    body { background: var(--bg-secondary); }

    .login-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding: 3rem 2.5rem;
        animation: fadeInUp 0.4s ease;
    }

    .login-logo {
        width: 56px;
        height: 56px;
        border-radius: var(--radius-md);
        background: linear-gradient(135deg, var(--primary), #7C3AED);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin: 0 auto 1.25rem;
    }

    .login-title {
        text-align: center;
        font-weight: 700;
        font-size: 1.5rem;
        color: var(--text-primary);
        margin-bottom: 0.25rem;
        letter-spacing: -0.02em;
    }

    .login-subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }

    .login-card .form-control {
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
    }

    .login-card .btn-primary {
        width: 100%;
        padding: 0.75rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: var(--radius-sm);
    }

    .login-footer {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.8rem;
        margin-top: 2rem;
    }

    .login-footer i { margin-right: 0.25rem; }

    .alert {
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-comments"></i>
        </div>
        <h2 class="login-title">Team Chat</h2>
        <p class="login-subtitle">登录你的团队聊天账号</p>

        {% if error %}
        <div class="alert alert-danger mb-3">
            <i class="fas fa-circle-exclamation me-1"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-right-to-bracket me-1"></i> 登录
            </button>
        </form>

        <div class="login-footer">
            <i class="fas fa-lock"></i> 仅限管理员添加的用户登录
        </div>
    </div>
</div>
{% endblock %}
